aid: transifex
name: Transifex
description: 'Transifex is a cloud-based localization management platform that enables
  development and content teams to translate software, websites, mobile apps, and
  digital content at scale. The Transifex REST API v3 provides programmatic access
  to manage translation projects, resources, language teams, and translation memory.
  Developers can automate localization workflows, push and pull source strings, trigger
  translation jobs, and integrate continuous localization into CI/CD pipelines. The
  platform supports OAuth 2.0 and bearer token authentication, with SDKs available
  for Python, JavaScript, Swift, Java, and a Go-based CLI tool.

  '
